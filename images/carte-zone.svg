<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Zone d'intervention Depann'Home</title>
  <desc id="desc">Carte stylisée indiquant les communes d'intervention autour d'Herbignac, Guérande, La Baule et Saint-Nazaire.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef8ef"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="900" height="520" rx="28" fill="url(#bg)"/>
  <path d="M104 388 C186 320 249 346 321 286 C401 219 456 243 541 173 C635 95 728 124 801 75" fill="none" stroke="#cdd8cf" stroke-width="26" stroke-linecap="round"/>
  <path d="M104 388 C186 320 249 346 321 286 C401 219 456 243 541 173 C635 95 728 124 801 75" fill="none" stroke="#47b649" stroke-width="8" stroke-linecap="round"/>
  <circle cx="438" cy="247" r="86" fill="#47b649" opacity="0.14"/>
  <circle cx="438" cy="247" r="14" fill="#47b649"/>
  <g font-family="Poppins, Arial, sans-serif" fill="#111">
    <text x="450" y="238" font-size="30" font-weight="700">Herbignac</text>
    <text x="450" y="270" font-size="17" fill="#555">siège d’intervention</text>
  </g>
  <g font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="600" fill="#111" filter="url(#shadow)">
    <g><rect x="132" y="122" width="140" height="42" rx="21" fill="#fff"/><text x="158" y="150">Guérande</text></g>
    <g><rect x="104" y="206" width="132" height="42" rx="21" fill="#fff"/><text x="128" y="234">La Baule</text></g>
    <g><rect x="592" y="292" width="166" height="42" rx="21" fill="#fff"/><text x="616" y="320">Saint-Nazaire</text></g>
    <g><rect x="596" y="112" width="124" height="42" rx="21" fill="#fff"/><text x="620" y="140">Mesquer</text></g>
    <g><rect x="624" y="384" width="148" height="42" rx="21" fill="#fff"/><text x="648" y="412">Pornichet</text></g>
    <g><rect x="300" y="372" width="126" height="42" rx="21" fill="#fff"/><text x="324" y="400">Assérac</text></g>
  </g>
  <g font-family="Poppins, Arial, sans-serif">
    <text x="56" y="64" font-size="34" font-weight="800" fill="#111">Zone d’intervention</text>
    <text x="56" y="98" font-size="18" fill="#555">Depann’Home — Loire-Atlantique</text>
